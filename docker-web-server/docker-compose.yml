services:
  mysql:
    image: mysql:8.0
    container_name: notes_db_container
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}~
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - notes-net
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u$$MYSQL_USER -p$$MYSQL_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: notes_backend_container
    restart: unless-stopped
    environment:
      SECRET_KEY: ${SECRET_KEY}
      MYSQL_HOST: ${MYSQL_HOST}
      MYSQL_PORT: ${MYSQL_PORT}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    networks:
      - notes-net
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s

  
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: notes_frontend_container
    restart: unless-stopped
    networks:
      - notes-net
    depends_on:
      backend:
        condition: service_healthy

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: notes_reverse_proxy_container
    restart: unless-stopped
    ports:
      - "8080:80"
    networks:
      - notes-net
    depends_on:
      frontend:
        condition: service_started
      backend:
        condition: service_healthy


volumes:
  mysql_data:
    name: notes_mysql_volume
    driver: local

networks:
  notes-net:
    name: notes_custom_network
    driver: bridge
